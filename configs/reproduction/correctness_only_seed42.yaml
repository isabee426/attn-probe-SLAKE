# Correctness-only GRPO baseline on SLAKE organ-only subset
# Reproduces: April 4-5 2026 experiment (Experiment 1 & 2)
# Spatial faith measured but NOT used in reward (alpha=1.0)
model:
  name_or_path: "Qwen/Qwen3-VL-2B-Thinking"
  dtype: "bfloat16"
  device: "cuda"
  use_lora: true
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

# Spatial classifier loaded for faith MEASUREMENT (not reward).
slake_dir: "/data3/ishaplan/slake_full/Slake1.0"
spatial_classifier: "/data3/ishaplan/slake_reproduction/checkpoints/spatial_probe_corrlabels/spatial_classifier.pkl"
use_lookback_lens: true

grpo:
  num_rollouts: 8
  reward_alpha: 1.0        # correctness only
  clip_eps: 0.2
  kl_beta: 0.05
  temperature: 1.0
  max_new_tokens: 512
  epochs: 1
  grad_accum_steps: 8
  log_every: 10
  ebpo_shrinkage: true
  drop_unformatted: true

training:
  learning_rate: 1.0e-5
  weight_decay: 0.01
  cosine_lr: true
  save_every_steps: 10
  checkpoint_dir: "/data3/ishaplan/slake_reproduction/checkpoints/correctness_only/seed42/"

data:
  datasets: ["slake"]
  image_cache_dir: "data/images"
  organ_only: true
  train_val_ratio: 10      # 10/1 split → ~1888 train / ~188 val

seed: 42
